<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedMinder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --primary: #F7FAF9;
    --secondary: #EAF7F0;
    --accent: #3FAE7C;
    --text: #22352F;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:var(--primary);
    color:var(--text);
}

/* NAV */
nav{
position:sticky;
top:0;
background:white;
padding:12px;
display:flex;
justify-content:center;
gap:30px;
border-bottom:2px solid var(--accent);
z-index:999;
}
nav a{color:var(--text);text-decoration:none;font-weight:500;}
nav i{color:var(--accent);}
  
/* SCROLL FIX */
.section{scroll-margin-top:80px;}

/* FLOATING */
.floating i{
position:absolute;
color:var(--accent);
opacity:0.22;
text-shadow:0 0 10px rgba(63,174,124,0.4);
animation:float 6s infinite ease-in-out;
}
.floating i:nth-child(1){top:5%;left:5%;font-size:40px;}
.floating i:nth-child(2){top:20%;left:15%;font-size:30px;}
.floating i:nth-child(3){top:40%;left:8%;font-size:35px;}
.floating i:nth-child(4){top:70%;left:12%;font-size:28px;}
.floating i:nth-child(5){top:10%;right:5%;font-size:40px;}
.floating i:nth-child(6){top:35%;right:10%;font-size:30px;}
.floating i:nth-child(7){bottom:15%;right:8%;font-size:35px;}
.floating i:nth-child(8){bottom:5%;left:45%;font-size:28px;}
  .floating i:nth-child(9){top:60%;right:30%;font-size:25px;}
.floating i:nth-child(10){bottom:30%;left:30%;font-size:25px;}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-20px);}
100%{transform:translateY(0);}
}

/* HEADER */
header{text-align:center;padding:25px;border-bottom:2px solid var(--accent);}
header h1{color:var(--accent);}

/* GRID */
.container{display:grid;grid-template-columns:1.8fr 0.8fr;}
.main{padding:40px;border-right:2px solid var(--accent);}

/* TEAM */
.team-photo{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:30px;
text-align:center;
}
.member img{
width:80px;height:80px;
border-radius:50%;
border:2px solid var(--accent);
}

/* SECTION */
.section{margin-bottom:35px;}
.section h2{color:var(--accent);}

/* ABOUT */
.about-text{
background:white;
padding:15px;
border-radius:10px;
border:1px solid var(--accent);
line-height:1.6;
}

/* PROJECT */
.project-main{
background:white;
padding:20px;
border-radius:12px;
border:1.5px solid var(--accent);
cursor:pointer;
margin-bottom:15px;
display:flex;
gap:10px;
transition:0.3s;
}
.project-main:hover{
transform:translateY(-5px);
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.project-main i{color:var(--accent);}

/* SIDEBAR */
.sidebar{
background:var(--secondary);
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}
.side-card,.mini-box{
background:white;
padding:12px;
border-radius:10px;
border:1px solid var(--accent);
font-size:13px;
}

/* EXTRA */
.extra{
padding:50px;
background:var(--secondary);
border-top:3px solid var(--accent);
}
.extra-box{
background:white;
padding:20px;
border-radius:12px;
border:1px solid var(--accent);
margin-top:15px;
transition:0.3s;
}
.extra-box:hover{
transform:translateY(-8px);
box-shadow:0 10px 20px rgba(63,174,124,0.25);
}
.divider{
height:2px;
background:var(--accent);
margin:25px 0;
opacity:0.3;
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}
.popup-content{
background:white;
padding:20px;
border-radius:12px;
width:320px;
border-top:5px solid var(--accent);
