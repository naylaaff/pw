<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedMinder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --primary: #F7FAF9;
    --secondary: #E6F4EA;
    --accent: #7FBF9F;
    --text: #2E3A36;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--primary);
    color: var(--text);
    overflow-x: hidden;
}

h1,h2,h3 {
    font-family: 'Poppins', sans-serif;
}

/* FLOATING UPGRADE */
.floating i {
    position: absolute;
    color: var(--accent);
    opacity: 0.18;
    filter: blur(1px);
}

/* posisi + ukuran */
.floating i:nth-child(1){ top:5%; left:5%; font-size:70px; animation: float1 8s infinite;}
.floating i:nth-child(2){ top:20%; left:15%; font-size:50px; animation: float2 7s infinite;}
.floating i:nth-child(3){ top:40%; left:8%; font-size:60px; animation: float3 6s infinite;}
.floating i:nth-child(4){ top:70%; left:12%; font-size:55px; animation: float2 8s infinite;}
.floating i:nth-child(5){ top:10%; right:5%; font-size:70px; animation: float1 7s infinite;}
.floating i:nth-child(6){ top:35%; right:10%; font-size:50px; animation: float3 6s infinite;}
.floating i:nth-child(7){ bottom:15%; right:8%; font-size:60px; animation: float2 7s infinite;}
.floating i:nth-child(8){ bottom:5%; left:45%; font-size:55px; animation: float1 9s infinite;}
.floating i:nth-child(9){ top:60%; right:30%; font-size:45px; animation: float3 6s infinite;}
.floating i:nth-child(10){ bottom:30%; left:30%; font-size:40px; animation: float2 7s infinite;}
.floating i:nth-child(11){ top:25%; right:40%; font-size:45px; animation: float1 8s infinite;}
.floating i:nth-child(12){ bottom:40%; right:20%; font-size:40px; animation: float3 6s infinite;}

@keyframes float1 {
    0% { transform: translateY(0); }
    50% { transform: translateY(-30px); }
    100% { transform: translateY(0); }
}

@keyframes float2 {
    0% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0); }
}

@keyframes float3 {
    0% { transform: translateY(0); }
    50% { transform: translateY(-25px); }
    100% { transform: translateY(0); }
}

/* HEADER */
header {
    text-align: center;
    padding: 25px;
    border-bottom: 2px solid var(--accent);
}

header h1 {
    color: var(--accent);
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: 1.8fr 0.8fr;
}

/* MAIN */
.main {
    padding: 40px;
    border-right: 2px solid var(--accent);
}

/* TEAM */
.team-photo {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin-bottom: 30px;
    text-align: center;
}

.member:hover {
    transform: translateY(-5px);
}

.member img {
    width: 75px;
    height: 75px;
    border-radius: 50%;
    border: 2px solid var(--accent);
}

/* SECTION */
.section {
    margin-bottom: 35px;
}

.section h2 {
    color: var(--accent);
    margin-bottom: 10px;
}

/* TENTANG PARAGRAF */
.about-text {
    line-height: 1.6;
    font-size: 14px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid var(--accent);
}

/* PROJECT */
.project-main {
    background: white;
    padding: 20px;
    border-radius: 12px;
    border: 1.5px solid var(--accent);
}

/* FITUR */
.project-detail {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}
