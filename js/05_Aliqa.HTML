<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Modul - Auto Fill Username</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding-top: 100px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; }
        h3 { margin-top: 0; color: #333; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; }
        #BtnLogin { background-color: #007bff; color: white; }
        #BtnLogin:hover { background-color: #0056b3; }
        #BtnCancel { background-color: #6c757d; color: white; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Login Form</h3>
        
        <label>Username</label>
        <input type="text" id="U3" placeholder=" ">
        
        <label>Sandi</label>
        <input type="password" id="S" placeholder="******">
        
        <div class="btn-group">
            <button id="BtnLogin">Login</button>
            <button id="BtnCancel" onclick="document.getElementById('U3').value=''">Reset</button>
        </div>
    </div>

    <script>
        // 1. DOM SELECTOR (Sesuai kode di papan tulis)
        let btnLogin = document.getElementById('BtnLogin');
        let US = document.getElementById('U3');

        // 2. EVENT LISTENER
        btnLogin.addEventListener('click', function() {
            
            // 3. AKSI (Sesuai baris terakhir di papan tulis: US.value = "Username")
            // Ini akan langsung mengisi kotak input dengan tulisan "Username"
            US.value = "Username"; 

            console.log("Aksi Berhasil: Nilai input telah diubah menjadi " + US.value);
        });
    </script>

</body>
</html>
