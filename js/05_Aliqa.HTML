<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Selection - Clean Version</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            padding-top: 100px; 
        }
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 320px; 
        }
        h3 { margin-bottom: 20px; color: #333; text-align: center; }
        label { font-weight: bold; font-size: 14px; color: #555; }
        input { 
            width: 100%; 
            padding: 10px; 
            margin: 8px 0 20px 0; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
        }
        .btn-group { display: flex; gap: 10px; }
        button { 
            flex: 1; 
            padding: 12px; 
            cursor: pointer; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            transition: 0.3s;
        }
        #BtnLogin { background-color: #28a745; color: white; }
        #BtnLogin:hover { background-color: #218838; }
        #BtnCancel { background-color: #6c757d; color: white; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Login Form</h3>
        
        <label>Username</label>
        <input type="text" id="U3" value="">
        
        <label>Sandi</label>
        <input type="password" id="S">
        
        <div class="btn-group">
            <button id="BtnLogin">Login</button>
            <button id="BtnCancel" onclick="document.getElementById('U3').value=''">Reset</button>
        </div>
    </div>

    <script>
        // 1. DOM SELECTOR
        const btnLogin = document.getElementById('BtnLogin');
        const US = document.getElementById('U3');

        // 2. EVENT LISTENER
        btnLogin.addEventListener('click', function() {
            
            // 3. ACTION (Data Injection)
            // Mengisi value secara otomatis saat tombol diklik
            US.value = "username"; 

            // Tambahan: memberikan fokus kursor ke input agar terlihat aktif
            US.focus();
        });
    </script>

</body>
</html>
