<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modul DOM Selection - Vanilla JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <h2>Login Form</h2>
        
        <label for="U3">Username:</label><br>
        <input type="text" id="U3" placeholder="Masukkan nama..."><br><br>
        
        <label for="S">Sandi:</label><br>
        <input type="password" id="S" placeholder="Masukkan sandi..."><br><br>
        
        <button id="BtnLogin">Login</button>
        <button id="BtnCancel">Cancel</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
