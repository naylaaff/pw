<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login Keren</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;

    background: linear-gradient(135deg, #ff9a9e, #fad0c4);

    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
  }

  input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  button {
    width: 100%;
    padding: 10px;
    background: #ff758c;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
  }
</style>

</head>

<body>

<div class="card">
  <h2>Login</h2>

  <input type="text" id="username" placeholder="Masukkan username">
  <input type="password" id="password" placeholder="Masukkan sandi">

  <button id="btnLogin">Login</button>
</div>

<script>
  document.getElementById("btnLogin").onclick = function() {
    document.getElementById("username").value = "username";
  }
</script>

</body>
</html>
