<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Pastel</title>

<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .login-box {
        background: #ffffffcc;
        backdrop-filter: blur(10px);
        padding: 30px;
        border-radius: 15px;
        width: 350px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .login-box h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #555;
    }

    .form-group {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
    }

    .form-group label {
        width: 90px;
        color: #555;
        font-size: 14px;
    }

    .form-group input {
        flex: 1;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #ddd;
        outline: none;
    }

    .btn-group {
        display: flex;
        justify-content: space-between;
        margin-top: 15px;
    }

    button {
        width: 48%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

    .login-btn {
        background: #a6c1ee;
        color: white;
    }

    .cancel-btn {
        background: #f3d1dc;
    }
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username">
    </div>

    <div class="form-group">
        <label>Sandi</label>
        <input type="password" id="password">
    </div>

    <div class="btn-group">
        <button class="login-btn" onclick="login()">Login</button>
        <button class="cancel-btn" onclick="cancel()">Cancel</button>
    </div>
</div>

<script>
function login() {
    // kosongin dulu
    document.getElementById("username").value = "";

    // isi tulisan "username"
    document.getElementById("username").value = "username";
}

function cancel() {
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
}
</script>

</body>
</html>
