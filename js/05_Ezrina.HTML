<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Pastel</title>

<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .login-box {
        background: #ffffffcc;
        backdrop-filter: blur(10px);
        padding: 30px;
        border-radius: 15px;
        width: 320px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .login-box h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #555;
    }

    .login-box input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #ddd;
        outline: none;
        transition: 0.3s;
    }

    .login-box input:focus {
        border-color: #a6c1ee;
    }

    .btn-group {
        display: flex;
        justify-content: space-between;
        margin-top: 15px;
    }

    button {
        width: 48%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    .login-btn {
        background: #a6c1ee;
        color: white;
    }

    .login-btn:hover {
        background: #8faeea;
    }

    .cancel-btn {
        background: #f3d1dc;
        color: #555;
    }

    .cancel-btn:hover {
        background: #e8b8c7;
    }
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <!-- AWAL KOSONG -->
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Sandi">

    <div class="btn-group">
        <button class="login-btn" onclick="login()">Login</button>
        <button class="cancel-btn" onclick="cancel()">Cancel</button>
    </div>
</div>

<script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (user === "" || pass === "") {
        alert("Isi dulu username dan sandi!");
    } else {
        // Setelah klik login → baru keisi otomatis
        document.getElementById("username").value = "admin";

        alert("Login berhasil!");
    }
}

function cancel() {
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
}
</script>

</body>
</html>
