<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .login-box {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 300px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .login-box h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .login-box input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    .btn-group {
        display: flex;
        justify-content: space-between;
        margin-top: 15px;
    }

    button {
        width: 48%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
    }

    .login-btn {
        background: #2575fc;
        color: white;
    }

    .cancel-btn {
        background: #ccc;
    }

    button:hover {
        opacity: 0.9;
    }
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Sandi">

    <div class="btn-group">
        <button class="login-btn" onclick="login()">Login</button>
        <button class="cancel-btn" onclick="cancel()">Cancel</button>
    </div>
</div>

<script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (user === "" || pass === "") {
        alert("Username dan Sandi harus diisi!");
    } else {
        // Auto isi / tetap tampil username
        document.getElementById("username").value = user;

        alert("Login berhasil! Username: " + user);

        // contoh redirect (opsional)
        // window.location.href = "home.html";
    }
}

function cancel() {
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
}
</script>

</body>
</html>
